<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #121212;
    color: #e0e0e0;
}

header {
    background-color: #1f1f1f;
    padding: 20px;
    text-align: center;
}

nav {
    background-color: #1f1f1f;
    padding: 10px;
    text-align: center;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    color: white;
}

nav a:hover {
    color: #bb86fc;
}

.container {
    padding: 30px;
}

.card {
    background: #1f1f1f;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 5px;
}

/* FORM STYLING (SEPARATE) */
form {
    display: block;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    background-color: #333;
    border: none;
    color: #e0e0e0;
    border-radius: 5px;
}

input[type="submit"] {
    background-color: #bb86fc;
    color: black;
    cursor: pointer;
}

input[type="submit"]:hover {
    background-color: #9a67ea;
}

/* PROJECT GRID (FOR PROJECT PAGE ONLY) */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card img {
    width: 100%;
    border-radius: 5px;
}
/* VIDEO PAGE STYLING */

iframe {
    display: block;
    margin: 20px auto;
    width: 800px;
    height: 400px;
    border: none;
}

.video-link {
    text-align: center;
    margin-top: 10px;
}

.video-link a {
    color: #bb86fc;
    text-decoration: none;
}

.video-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<header>
<h1>Contact Me</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
<a href="report.html">Report</a>
<a href="videodemo.html">Video Demo</a>
</nav>

<main>

<h2>Get in Touch</h2>

<form action="mailto:sionz03@icloud.com" method="post" enctype="text/plain">

<label for="name">Name:</label>
<input type="text" id="name" name="name" required>

<label for="email">Email:</label>
<input type="email" id="email" name="email" required>

<label for="message">Message:</label>
<textarea id="message" name="message" rows="5" required></textarea>

<button type="submit">Send</button>

</form>

</main>

</body>
</html>
